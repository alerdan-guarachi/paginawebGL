name: appgoodlife
description: "Aplicación Oficial de GOOD LIFE S.R.L. para gestión de informes médicos y trámites."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # ▼▼▼ PAQUETE DE LOCALIZACIÓN AÑADIDO ▼▼▼
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.1.0
  shared_preferences: ^2.1.1
  url_launcher: ^6.1.10
  flutter_local_notifications: ^17.0.0
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  flutter_pdfview: ^1.3.2
  path_provider: ^2.1.1
  screen_protector: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/iconogoodlife.png"

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/iconogoodlife.png
