<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Comprobante de Inventario</title>
  <style>
    @page {
      size: 80mm;
      margin: 2mm;
    }

    body {
      font-family: 'Arial', sans-serif;
      font-size: 10px;
      width: 80mm;
      margin: 0 auto;
      color: #000;
    }

    .container {
      width: 100%;
      padding: 0;
      margin-top: 5mm;
    }

    .header {
      text-align: center;
      margin-bottom: 5mm;
    }

    .header img {
      max-width: 40mm;
      height: auto;
      margin-bottom: 2mm;
    }

    .header h3 {
      font-size: 12px;
      margin: 2mm 0 1mm;
      font-weight: bold;
    }

    .header p {
      font-size: 9px;
      margin: 1mm 0;
    }

    .summary {
      text-align: left;
      font-size: 10px;
      border-top: 1px dashed #000;
      border-bottom: 1px dashed #000;
      padding: 4mm 0;
      margin: 6mm 0;
    }

    .summary p {
      margin: 2mm 0;
      padding-left: 5mm;
    }

    .summary .label {
      font-weight: bold;
    }

    .product-details {
      margin-bottom: 4mm;
    }

    .product-details p {
      margin: 2mm 0;
      padding-left: 8mm;
    }

    .product-details .label {
      font-weight: bold;
    }

    .signature {
      margin-top: 10mm;
      text-align: center;
    }

    .signature .line {
      border-top: 1px solid #000;
      width: 50mm;
      margin: 0 auto;
      padding-top: 2mm;
      margin-bottom: 2mm;
    }

    .signature p {
      font-size: 9px;
      margin-top: -10px;
      text-transform: uppercase;
    }

    .print-button {
      display: none;
    }

    @media print {
      .print-button {
        display: none;
      }
    }
  </style>
</head>
